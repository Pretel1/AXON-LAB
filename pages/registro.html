<!-- ============================================ -->
<!-- PÁGINA: REGISTRO DE USUARIO (CORREGIDO)      -->
<!-- Registro con Firebase Auth + envío OTP      -->
<!-- ============================================ -->

<div class="page fade-in">
    <div class="container" style="max-width: 500px;">
        
        <div class="page-header" style="text-align: center; margin-bottom: var(--space-xl);">
            <h1>📝 <span class="highlight">Registrarse</span></h1>
            <p style="color: var(--text-muted);">Crea una cuenta para acceder a todas las funciones</p>
        </div>
        
        <div class="form-container">
            <form id="registroForm">
                <div class="form-group">
                    <label for="regNombre">Nombre completo *</label>
                    <input type="text" id="regNombre" name="nombre" required placeholder="Ej: Juan Pérez">
                    <span class="error-message" id="errorNombre">El nombre es requerido</span>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">Correo electrónico *</label>
                    <input type="email" id="regEmail" name="email" required placeholder="ejemplo@dominio.com">
                    <span class="error-message" id="errorEmail">Ingresa un email válido</span>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Contraseña *</label>
                    <input type="password" id="regPassword" name="password" required placeholder="Mínimo 6 caracteres">
                    <span class="error-message" id="errorPassword">La contraseña debe tener al menos 6 caracteres</span>
                </div>
                
                <div class="form-group">
                    <label for="regConfirmPassword">Confirmar contraseña *</label>
                    <input type="password" id="regConfirmPassword" name="confirm_password" required placeholder="Repite tu contraseña">
                    <span class="error-message" id="errorConfirm">Las contraseñas no coinciden</span>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">✅ Registrarse</button>
                </div>
            </form>
            
            <p style="text-align: center; margin-top: var(--space-lg);">
                ¿Ya tienes cuenta? <a href="#login" style="color: var(--color-primary);">Inicia sesión aquí</a>
            </p>
            
            <div id="mensaje" style="display: none; margin-top: var(--space-md); padding: var(--space-md); border-radius: var(--radius-md);"></div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    
    const form = document.getElementById('registroForm');
    const mensajeDiv = document.getElementById('mensaje');
    
    // ============================================
    // VALIDACIÓN EN TIEMPO REAL
    // ============================================
    const nombreInput = document.getElementById('regNombre');
    const emailInput = document.getElementById('regEmail');
    const passwordInput = document.getElementById('regPassword');
    const confirmInput = document.getElementById('regConfirmPassword');
    
    nombreInput?.addEventListener('input', () => {
        document.getElementById('errorNombre').style.display = 'none';
    });
    
    emailInput?.addEventListener('input', () => {
        document.getElementById('errorEmail').style.display = 'none';
    });
    
    passwordInput?.addEventListener('input', () => {
        if (passwordInput.value.length >= 6) {
            document.getElementById('errorPassword').style.display = 'none';
        }
        validarConfirmacion();
    });
    
    confirmInput?.addEventListener('input', () => {
        validarConfirmacion();
    });
    
    function validarConfirmacion() {
        const password = passwordInput?.value || '';
        const confirm = confirmInput?.value || '';
        const errorConfirm = document.getElementById('errorConfirm');
        
        if (confirm !== '' && password !== confirm) {
            errorConfirm.style.display = 'block';
        } else {
            errorConfirm.style.display = 'none';
        }
    }
    
    // ============================================
    // REGISTRO DE USUARIO
    // ============================================
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nombre = nombreInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmInput.value;
        
        let isValid = true;
        
        if (!nombre) {
            document.getElementById('errorNombre').style.display = 'block';
            isValid = false;
        }
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email || !emailRegex.test(email)) {
            document.getElementById('errorEmail').style.display = 'block';
            isValid = false;
        }
        
        if (!password || password.length < 6) {
            document.getElementById('errorPassword').style.display = 'block';
            isValid = false;
        }
        
        if (password !== confirmPassword) {
            document.getElementById('errorConfirm').style.display = 'block';
            isValid = false;
        }
        
        if (!isValid) return;
        
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.textContent = '⏳ Registrando...';
        mensajeDiv.style.display = 'none';
        
        try {
            const result = await window.registrarUsuario(email, password, nombre);
            
            mensajeDiv.style.display = 'block';
            
            if (result.success) {
                mensajeDiv.innerHTML = '✅ ' + result.message;
                mensajeDiv.className = 'alert alert-success';
                
                setTimeout(() => {
                    if (result.verificacionRequerida) {
                        if (typeof window.cambiarPagina === 'function') {
                            window.cambiarPagina('verificacion', { email: email });
                        } else {
                            window.location.hash = `verificacion?email=${encodeURIComponent(email)}`;
                        }
                    } else {
                        if (typeof window.cambiarPagina === 'function') {
                            window.cambiarPagina('login');
                        } else {
                            window.location.hash = '#login';
                        }
                    }
                }, 2000);
            } else {
                mensajeDiv.innerHTML = '❌ ' + result.message;
                mensajeDiv.className = 'alert alert-error';
                btn.disabled = false;
                btn.textContent = '✅ Registrarse';
            }
            
        } catch (error) {
            console.error('Error en registro:', error);
            mensajeDiv.innerHTML = '❌ Error al registrar. Intenta nuevamente.';
            mensajeDiv.className = 'alert alert-error';
            mensajeDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '✅ Registrarse';
        }
    });
    
})();
</script>
