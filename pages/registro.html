<!-- ============================================ -->
<!-- PÁGINA: REGISTRO DE USUARIO                  -->
<!-- ============================================ -->

<div class="page fade-in">
    <div class="container" style="max-width: 500px;">
        <div class="page-header" style="text-align: center; margin-bottom: var(--space-xl);">
            <h1>📝 <span class="highlight">Registrarse</span></h1>
            <p style="color: var(--text-muted);">Crea una cuenta para acceder a todas las funciones</p>
        </div>

        <div class="form-container">
            <form id="registroForm">
                <div class="form-group">
                    <label>Nombre completo *</label>
                    <input type="text" id="regNombre" required placeholder="Ej: Juan Pérez">
                </div>

                <div class="form-group">
                    <label>Correo electrónico *</label>
                    <input type="email" id="regEmail" required placeholder="ejemplo@dominio.com">
                </div>

                <div class="form-group">
                    <label>Contraseña *</label>
                    <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
                </div>

                <div class="form-group">
                    <label>Confirmar contraseña *</label>
                    <input type="password" id="regConfirmPassword" required placeholder="Repite tu contraseña">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">✅ Registrarse</button>
                </div>
            </form>

            <p style="text-align: center; margin-top: var(--space-lg);">
                ¿Ya tienes cuenta? <a href="#login" style="color: var(--color-primary);">Inicia sesión aquí</a>
            </p>

            <div id="mensaje" style="display: none; margin-top: var(--space-md); padding: var(--space-md); border-radius: var(--radius-md);"></div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('registroForm');
    const mensajeDiv = document.getElementById('mensaje');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nombre = document.getElementById('regNombre').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        
        if (!nombre || !email || !password) {
            alert('⚠️ Completa todos los campos');
            return;
        }
        
        if (password.length < 6) {
            alert('⚠️ La contraseña debe tener al menos 6 caracteres');
            return;
        }
        
        if (password !== confirmPassword) {
            alert('⚠️ Las contraseñas no coinciden');
            return;
        }
        
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.textContent = '⏳ Registrando...';
        mensajeDiv.style.display = 'none';
        
        try {
            const result = await window.registrarUsuario(email, password, nombre);
            
            mensajeDiv.style.display = 'block';
            
            if (result.success) {
                mensajeDiv.innerHTML = '✅ ' + result.message;
                mensajeDiv.className = 'alert alert-success';
                setTimeout(() => {
                    window.location.href = '#login';
                }, 2000);
            } else {
                mensajeDiv.innerHTML = '❌ ' + result.message;
                mensajeDiv.className = 'alert alert-error';
                btn.disabled = false;
                btn.textContent = '✅ Registrarse';
            }
        } catch (error) {
            mensajeDiv.innerHTML = '❌ Error al registrar';
            mensajeDiv.className = 'alert alert-error';
            mensajeDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '✅ Registrarse';
        }
    });
</script>
