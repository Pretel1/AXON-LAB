<div class="form-container animate-fade-in-up">
    <div class="form-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 class="text-gradient">Crear Cuenta AXON</h2>
            <p style="color: var(--text-secondary); font-size: var(--text-sm);">
                Únete a la plataforma de laboratorios de ingeniería
            </p>
        </div>
        
        <form id="registroForm">
            <div class="form-group">
                <label for="regNombre" class="form-label required">Nombre Completo</label>
                <input type="text" id="regNombre" class="form-input" placeholder="Ej. Dany Pretel" required>
            </div>
            
            <div class="form-group">
                <label for="regEmail" class="form-label required">Correo Electrónico</label>
                <input type="email" id="regEmail" class="form-input" placeholder="usuario@axon.edu" required>
                <small class="form-help">Utiliza un correo válido para verificar tu cuenta.</small>
            </div>
            
            <div class="form-group">
                <label for="regPass" class="form-label required">Contraseña</label>
                <input type="password" id="regPass" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>

            <button type="submit" id="regBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Registrarse Ahora
            </button>
            
            <div id="regMessage" class="alert" style="display: none; margin-top: 1.5rem;"></div>
        </form>

        <div class="divider">O</div>
        
        <p style="text-align: center; font-size: var(--text-sm); color: var(--text-muted);">
            ¿Ya eres miembro? <a href="#login" style="color: var(--color-primary); font-weight: var(--font-bold);">Inicia sesión aquí</a>
        </p>
    </div>
</div>

<script type="module">
    // Importamos la lógica desde auth.js (Ruta relativa desde /pages hacia /js)
    import { registrarUsuario } from '../js/auth.js';

    const form = document.getElementById('registroForm');
    const msgArea = document.getElementById('regMessage');
    const btn = document.getElementById('regBtn');

    // Manejador del evento de envío
    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Estado de carga visual
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin">🌀</span> Procesando...';
            msgArea.style.display = 'none';

            // Captura de datos
            const nombre = document.getElementById('regNombre').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;

            try {
                // Llamada a la función de Supabase definida en auth.js
                const result = await registrarUsuario(nombre, email, pass);

                if (result.success) {
                    // ÉXITO: Mostrar mensaje y limpiar
                    msgArea.className = 'alert alert-success';
                    msgArea.innerHTML = `<strong>¡Registro iniciado!</strong><br>${result.message}`;
                    msgArea.style.display = 'block';
                    form.reset();
                    
                    // Redirigir al login después de un breve delay
                    setTimeout(() => {
                        window.location.hash = 'login';
                    }, 4000);

                } else {
                    // ERROR: Mostrar por qué falló
                    throw new Error(result.message);
                }
            } catch (error) {
                msgArea.className = 'alert alert-error';
                msgArea.innerHTML = `<strong>Error:</strong> ${error.message}`;
                msgArea.style.display = 'block';
                
                // Restaurar botón para reintento
                btn.disabled = false;
                btn.textContent = 'Registrarse Ahora';
            }
        });
    }
</script>
