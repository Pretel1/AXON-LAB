<div class="form-container animate-fade-in-up">
    <div class="form-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 class="text-gradient">Únete a AXON</h2>
            <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 0.5rem;">
                Crea tu cuenta para acceder a los laboratorios
            </p>
        </div>
        
        <form id="registroForm">
            
            <div class="form-group">
                <label for="regNombre" class="form-label required">Nombre Completo</label>
                <input type="text" id="regNombre" class="form-input" placeholder="Ej. Dany Jose Pretel" required>
            </div>
            
            <div class="form-group">
                <label for="regEmail" class="form-label required">Correo Electrónico</label>
                <input type="email" id="regEmail" class="form-input" placeholder="usuario@ejemplo.com" required>
            </div>
            
            <div class="form-group">
                <label for="regPass" class="form-label required">Contraseña</label>
                <input type="password" id="regPass" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8">
                <small style="color: var(--text-muted); font-size: 0.7rem; display: block; margin-top: 0.3rem;">
                    Usa una combinación de letras y números.
                </small>
            </div>

            <button type="submit" id="regBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Registrarse Ahora
            </button>
            
            <div id="regMessage" class="alert" style="display: none; margin-top: 1.5rem;"></div>
        </form>

        <div class="divider">O</div>
        
        <p style="text-align: center; font-size: var(--text-sm); color: var(--text-muted);">
            ¿Ya tienes una cuenta? 
            <a href="#login" style="color: var(--color-primary); font-weight: var(--font-bold); text-decoration: none;">
                Inicia sesión aquí
            </a>
        </p>
    </div>
</div>
