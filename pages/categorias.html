<div class="container">
    <h2>🏷️ Explorar por categorías</h2>
    <div id="listaCategorias" class="grid"></div>
</div>
<script>
    const labs = window.obtenerLaboratorios();
    const categorias = [...new Set(labs.map(l => l.categoria))];
    const container = document.getElementById('listaCategorias');
    if (categorias.length) {
        container.innerHTML = categorias.map(cat => `
            <div class="card">
                <h3>${cat}</h3>
                <p>${labs.filter(l => l.categoria === cat).length} laboratorios</p>
                <button class="btn" onclick="window.cambiarPagina('laboratorios'); setTimeout(() => document.getElementById('categoriaFilter').value='${cat}', 100);">Ver</button>
            </div>
        `).join('');
    } else {
        container.innerHTML = '<p>No hay categorías.</p>';
    }
</script>
