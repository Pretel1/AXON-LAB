<div class="container">
    <h1>📚 Bienvenido a AXON</h1>
    <p>Repositorio de laboratorios académicos. Comparte, descubre y aprende usando enlaces de OneDrive.</p>
    <div style="margin-top: 2rem;">
        <button class="btn" onclick="window.cambiarPagina('laboratorios')">Ver laboratorios</button>
        <button class="btn btn-outline" onclick="window.cambiarPagina('subir')">Subir laboratorio</button>
    </div>
    <div style="margin-top: 2rem;">
        <h3>📊 Estadísticas</h3>
        <p>Laboratorios disponibles: <strong id="totalLabs">0</strong></p>
    </div>
</div>
<script>
    function actualizarEstadisticas() {
        const labs = window.obtenerLaboratorios();
        document.getElementById('totalLabs').textContent = labs.length;
    }
    actualizarEstadisticas();
    document.addEventListener('pageLoaded', (e) => {
        if (e.detail.page === 'inicio') actualizarEstadisticas();
    });
</script>
