<div class="form-card">
    <h2>📤 Subir nuevo laboratorio</h2>
    <p>Ingresa los datos. La <strong>imagen de portada</strong> debe ser una URL pública (ej. de Imgur, Pinterest, etc.)</p>
    <form id="formSubir">
        <div class="form-group"><label>Nombre del laboratorio *</label><input type="text" id="labNombre" required></div>
        <div class="form-group"><label>Autor(es) *</label><input type="text" id="labAutor" required></div>
        <div class="form-group"><label>Categoría *</label>
            <select id="labCategoria" required>
                <option value="">Seleccionar</option>
                <option>Programación</option><option>Redes</option><option>Bases de Datos</option>
                <option>Inteligencia Artificial</option><option>Seguridad</option><option>Otros</option>
            </select>
        </div>
        <div class="form-group"><label>URL de la imagen de portada</label>
            <input type="url" id="labImagen" placeholder="https://ejemplo.com/imagen.jpg">
            <small>Deja vacío para usar imagen por defecto</small>
        </div>
        <div class="form-group"><label>Enlace de OneDrive (archivo) *</label>
            <input type="url" id="labArchivo" placeholder="https://onedrive.live.com/..." required>
        </div>
        <button type="submit" class="btn">Subir laboratorio</button>
        <div id="msgSubir"></div>
    </form>
</div>
<script>
    document.getElementById('formSubir').addEventListener('submit', (e) => {
        e.preventDefault();
        const nombre = document.getElementById('labNombre').value.trim();
        const autor = document.getElementById('labAutor').value.trim();
        const categoria = document.getElementById('labCategoria').value;
        let imagenUrl = document.getElementById('labImagen').value.trim();
        const archivoUrl = document.getElementById('labArchivo').value.trim();

        if (!nombre || !autor || !categoria || !archivoUrl) {
            window.mostrarNotificacion('Completa todos los campos obligatorios', 'error');
            return;
        }
        if (!archivoUrl.startsWith('http')) {
            window.mostrarNotificacion('El enlace debe comenzar con http:// o https://', 'error');
            return;
        }
        const result = window.agregarLaboratorio(nombre, autor, categoria, imagenUrl, archivoUrl);
        const msgDiv = document.getElementById('msgSubir');
        if (result.success) {
            msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
            document.getElementById('formSubir').reset();
            setTimeout(() => window.cambiarPagina('laboratorios'), 1500);
        } else {
            msgDiv.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
        }
    });
</script>
