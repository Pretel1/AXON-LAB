<!-- pages/subir.html - VERSION FINAL PRO -->
<div class="container fade-in">
    <div class="form-card" style="max-width: 600px; margin: 0 auto;">
        
        <div style="text-align:center; margin-bottom:2rem;">
            <h2>📤 Subir laboratorio</h2>
            <p style="color:gray;">Comparte tu laboratorio</p>
        </div>

        <div id="userInfo" style="display:none; background:#e8f5e9; padding:10px; border-radius:8px;">
            ✅ Subiendo como: <strong id="userEmailDisplay"></strong>
        </div>

        <form id="formSubir">

            <input id="labNombre" placeholder="Título" required>
            <textarea id="labDescripcion" placeholder="Descripción" required></textarea>

            <select id="labCategoria" required>
                <option value="">Categoría</option>
                <option value="Programación">Programación</option>
                <option value="Seguridad">Seguridad</option>
                <option value="Redes">Redes</option>
                <option value="IA">IA</option>
            </select>

            <input type="file" id="labArchivo" required>

            <button type="submit" id="submitBtn">Subir</button>

            <div id="msgSubir"></div>

        </form>
    </div>
</div>

<script type="module">
import { uploadLab } from '../js/labs.js';
import { initAuth } from '../js/auth.js';

const form = document.getElementById('formSubir');
const msg = document.getElementById('msgSubir');
const btn = document.getElementById('submitBtn');

let archivo = null;

// ============================================
// ESPERAR AUTH REAL (FIX IMPORTANTE)
// ============================================
const user = await initAuth();

if (!user) {
    msg.innerHTML = '⚠️ Debes iniciar sesión';
    form.style.display = 'none';
    setTimeout(()=>location.hash='login',1500);
} else {
    document.getElementById('userEmailDisplay').textContent = user.email;
    document.getElementById('userInfo').style.display = 'block';
}

// ============================================
// FILE
// ============================================
document.getElementById('labArchivo').addEventListener('change', e=>{
    archivo = e.target.files[0];
});

// ============================================
// SUBMIT
// ============================================
form.addEventListener('submit', async e=>{
    e.preventDefault();

    const nombre = document.getElementById('labNombre').value.trim();
    const desc = document.getElementById('labDescripcion').value.trim();
    const cat = document.getElementById('labCategoria').value;

    if (!archivo) return msg.innerHTML='❌ Archivo requerido';
    if (archivo.size > 10*1024*1024) return msg.innerHTML='❌ Máx 10MB';

    btn.disabled = true;
    btn.textContent = 'Subiendo...';

    const res = await uploadLab(archivo, nombre, desc, cat);

    if (res.success) {
        msg.innerHTML='✅ Subido';
        form.reset();
        setTimeout(()=>location.hash='laboratorios',1500);
    } else {
        msg.innerHTML='❌ '+res.error;
        btn.disabled=false;
        btn.textContent='Subir';
    }
});
</script>
