<div class="container" style="max-width: 600px; margin: 2rem auto;">
    <h2>📤 Subir nuevo laboratorio</h2>
    <p>Ingresa el <strong>enlace compartido de OneDrive</strong> (o cualquier URL pública del archivo).</p>
    <form id="subirLaboratorioForm">
        <div class="form-group">
            <label>Nombre del laboratorio *</label>
            <input type="text" id="labNombre" required>
        </div>
        <div class="form-group">
            <label>Autor(es) *</label>
            <input type="text" id="labAutor" required>
        </div>
        <div class="form-group">
            <label>Categoría *</label>
            <select id="labCategoria" required>
                <option value="">Seleccionar</option>
                <option>Programación</option>
                <option>Redes</option>
                <option>Bases de Datos</option>
                <option>Inteligencia Artificial</option>
                <option>Seguridad</option>
                <option>Otros</option>
            </select>
        </div>
        <div class="form-group">
            <label>Enlace de OneDrive (o URL) *</label>
            <input type="url" id="labUrl" placeholder="https://onedrive.live.com/..." required>
            <small>Pega aquí el enlace que obtienes al compartir el archivo desde OneDrive.</small>
        </div>
        <button type="submit" class="btn btn-primary">Subir laboratorio</button>
        <div id="mensajeSubida" style="margin-top: 1rem;"></div>
    </form>
</div>

<script>
    const form = document.getElementById('subirLaboratorioForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('labNombre').value.trim();
        const autor = document.getElementById('labAutor').value.trim();
        const categoria = document.getElementById('labCategoria').value;
        const url = document.getElementById('labUrl').value.trim();

        if (!nombre || !autor || !categoria || !url) {
            alert('Completa todos los campos');
            return;
        }
        if (!url.startsWith('http')) {
            alert('El enlace debe comenzar con http:// o https://');
            return;
        }

        const user = firebaseAuth.currentUser;
        if (!user) {
            alert('Debes iniciar sesión para subir laboratorios');
            window.cambiarPagina('login');
            return;
        }

        try {
            await firebaseDB.collection('laboratorios').add({
                nombre, autor, categoria, url,
                usuarioId: user.uid,
                fechaSubida: firebase.firestore.FieldValue.serverTimestamp(),
                descargas: 0
            });
            document.getElementById('mensajeSubida').innerHTML = '<div class="alert alert-success">✅ Laboratorio subido correctamente</div>';
            form.reset();
            setTimeout(() => window.cambiarPagina('laboratorios'), 1500);
        } catch (error) {
            document.getElementById('mensajeSubida').innerHTML = `<div class="alert alert-error">❌ Error: ${error.message}</div>`;
        }
    });
</script>
