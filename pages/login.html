<div class="form-card">
    <h2>🔑 Iniciar Sesión</h2>
    <p>Accede a tu cuenta de AXON-LAB</p>
    
    <form id="formLogin">
        <div class="form-group">
            <label class="form-label required">Correo electrónico</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="ejemplo@correo.com" required>
        </div>
        
        <div class="form-group">
            <label class="form-label required">Contraseña</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Ingresa tu contraseña" required>
            <div class="form-help">
                <a href="#" id="btnOlvidePassword" class="link-recuperar">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" id="btnIngresar">🔐 Ingresar</button>
        <div id="msgLogin"></div>
    </form>
    
    <div class="divider">O</div>
    
    <button id="googleLoginBtn" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesión con Google
    </button>
    
    <p>¿No tienes cuenta? <a href="#" onclick="window.cambiarPagina('registro'); return false;">Regístrate aquí</a></p>
</div>

<!-- ========================================== -->
<!-- MODAL: RECUPERAR CONTRASEÑA -->
<!-- ========================================== -->
<div id="modalRecuperar" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🔐 Recuperar contraseña</h3>
            <button class="modal-close" id="btnCerrarModal">&times;</button>
        </div>
        <div class="modal-body">
            <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
            
            <form id="formRecuperar">
                <div class="form-group">
                    <label class="form-label required">Correo electrónico</label>
                    <input type="email" id="recuperarEmail" class="form-input" placeholder="ejemplo@correo.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="btnEnviarRecuperacion">📧 Enviar enlace de recuperación</button>
                <div id="msgRecuperar"></div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Estilos para el modal */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    
    .modal-content {
        background: white;
        border-radius: 12px;
        max-width: 450px;
        width: 90%;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        animation: modalFadeIn 0.3s ease;
    }
    
    @keyframes modalFadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #e5e7eb;
    }
    
    .modal-header h3 {
        margin: 0;
        color: #1f2937;
    }
    
    .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #6b7280;
        transition: color 0.2s;
    }
    
    .modal-close:hover {
        color: #1f2937;
    }
    
    .modal-body {
        padding: 1.5rem;
    }
    
    .link-recuperar {
        color: #007bff;
        text-decoration: none;
        font-size: 0.875rem;
        cursor: pointer;
    }
    
    .link-recuperar:hover {
        text-decoration: underline;
    }
    
    .form-help {
        margin-top: 0.25rem;
        text-align: right;
    }
    
    .alert {
        padding: 0.75rem;
        border-radius: 6px;
        margin-top: 1rem;
        font-size: 0.875rem;
    }
    
    .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    
    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
    
    .alert-info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
    }
    
    .btn-primary {
        background: #007bff;
        color: white;
        width: 100%;
    }
    
    .btn-primary:hover {
        background: #0056b3;
    }
    
    .divider {
        text-align: center;
        margin: 1rem 0;
        position: relative;
    }
    
    .divider::before,
    .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 45%;
        height: 1px;
        background: #e5e7eb;
    }
    
    .divider::before {
        left: 0;
    }
    
    .divider::after {
        right: 0;
    }
    
    .btn-google {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        transition: background 0.2s;
    }
    
    .btn-google:hover {
        background: #f9fafb;
    }
</style>

<script type="module">
    import { iniciarSesion, iniciarSesionConGoogle, recuperarPassword } from '../js/auth.js';
    
    // ============================================
    // LOGIN CON EMAIL/PASSWORD
    // ============================================
    const form = document.getElementById('formLogin');
    const msgDiv = document.getElementById('msgLogin');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        
        if (!email || !pass) {
            msgDiv.innerHTML = '<div class="alert alert-error">⚠️ Completa todos los campos</div>';
            return;
        }
        
        // Mostrar loading
        const btn = form.querySelector('button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = '⏳ Ingresando...';
        btn.disabled = true;
        
        const result = await iniciarSesion(email, pass);
        
        if (result.success) {
            msgDiv.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
            
            // Mostrar advertencia si el email no está verificado
            if (result.emailVerificado === false) {
                msgDiv.innerHTML += '<div class="alert alert-info">⚠️ Por favor, verifica tu email para acceder a todas las funciones.</div>';
            }
            
            setTimeout(() => {
                if (window.cambiarPagina) {
                    window.cambiarPagina('inicio');
                } else {
                    window.location.hash = 'inicio';
                }
            }, 2000);
        } else {
            msgDiv.innerHTML = `<div class="alert alert-error">❌ ${result.message}</div>`;
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });
    
    // ============================================
    // LOGIN CON GOOGLE
    // ============================================
    const googleBtn = document.getElementById('googleLoginBtn');
    if (googleBtn) {
        googleBtn.addEventListener('click', async () => {
            await iniciarSesionConGoogle();
        });
    }
    
    // ============================================
    // MODAL DE RECUPERACIÓN DE CONTRASEÑA
    // ============================================
    const modal = document.getElementById('modalRecuperar');
    const btnOlvide = document.getElementById('btnOlvidePassword');
    const btnCerrarModal = document.getElementById('btnCerrarModal');
    const formRecuperar = document.getElementById('formRecuperar');
    const msgRecuperar = document.getElementById('msgRecuperar');
    
    // Abrir modal
    btnOlvide.addEventListener('click', (e) => {
        e.preventDefault();
        modal.style.display = 'flex';
    });
    
    // Cerrar modal
    btnCerrarModal.addEventListener('click', () => {
        modal.style.display = 'none';
        msgRecuperar.innerHTML = '';
        document.getElementById('recuperarEmail').value = '';
    });
    
    // Cerrar modal al hacer clic fuera
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
            msgRecuperar.innerHTML = '';
            document.getElementById('recuperarEmail').value = '';
        }
    });
    
    // Enviar recuperación
    formRecuperar.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('recuperarEmail').value.trim();
        
        if (!email) {
            msgRecuperar.innerHTML = '<div class="alert alert-error">⚠️ Ingresa tu correo electrónico</div>';
            return;
        }
        
        // Mostrar loading
        const btn = formRecuperar.querySelector('button');
        const originalText = btn.textContent;
        btn.textContent = '⏳ Enviando...';
        btn.disabled = true;
        
        const result = await recuperarPassword(email);
        
        if (result.success) {
            msgRecuperar.innerHTML = `<div class="alert alert-success">✅ ${result.message}</div>`;
            
            // Cerrar modal después de 3 segundos
            setTimeout(() => {
                modal.style.display = 'none';
                msgRecuperar.innerHTML = '';
                document.getElementById('recuperarEmail').value = '';
            }, 3000);
        } else {
            msgRecuperar.innerHTML = `<div class="alert alert-error">❌ ${result.message}</div>`;
            btn.textContent = originalText;
            btn.disabled = false;
        }
    });
</script>
