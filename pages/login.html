<div class="form-card">
    <h2>🔑 Iniciar Sesión</h2>
    <p>Accede a tu cuenta de AXON-LAB</p>
    
    <form id="formLogin">
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="loginEmail" placeholder="ejemplo@correo.com" required>
        </div>
        
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña" required>
            <div>
                <a href="#" id="btnOlvidePassword">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
        
        <button type="submit" id="btnIngresar">🔐 Ingresar</button>
        <div id="msgLogin"></div>
    </form>
    
    <hr>
    
    <button id="googleLoginBtn">🌐 Iniciar sesión con Google</button>
    
    <p>¿No tienes cuenta? 
        <a href="#" onclick="window.location.hash='registro'">Regístrate aquí</a>
    </p>
</div>

<!-- MODAL -->
<div id="modalRecuperar" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:10px; width:300px;">
        <h3>Recuperar contraseña</h3>
        
        <form id="formRecuperar">
            <input type="email" id="recuperarEmail" placeholder="Correo" required>
            <button type="submit">Enviar</button>
            <div id="msgRecuperar"></div>
        </form>
        
        <button id="btnCerrarModal">Cerrar</button>
    </div>
</div>

<script type="module">
import { iniciarSesion, iniciarSesionConGoogle, recuperarPassword, initAuth } from '../js/auth.js';

// ================= LOGIN =================
const form = document.getElementById('formLogin');
const msg = document.getElementById('msgLogin');

form.addEventListener('submit', async e=>{
    e.preventDefault();

    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;

    if (!email || !pass) {
        msg.innerHTML = '❌ Completa los campos';
        return;
    }

    const btn = document.getElementById('btnIngresar');
    btn.disabled = true;
    btn.textContent = 'Ingresando...';

    const res = await iniciarSesion(email, pass);

    if (res.success) {
        await initAuth(); // 🔥 importante

        msg.innerHTML = '✅ Bienvenido';
        setTimeout(()=>location.hash='inicio',1200);

    } else {
        msg.innerHTML = '❌ ' + res.message;
        btn.disabled = false;
        btn.textContent = '🔐 Ingresar';
    }
});

// ================= GOOGLE =================
document.getElementById('googleLoginBtn')
.addEventListener('click', async ()=>{
    await iniciarSesionConGoogle();
});

// ================= MODAL =================
const modal = document.getElementById('modalRecuperar');

document.getElementById('btnOlvidePassword')
.addEventListener('click', e=>{
    e.preventDefault();
    modal.style.display='flex';
});

document.getElementById('btnCerrarModal')
.addEventListener('click', ()=>{
    modal.style.display='none';
});

// ================= RECUPERAR =================
const formRec = document.getElementById('formRecuperar');
const msgRec = document.getElementById('msgRecuperar');

formRec.addEventListener('submit', async e=>{
    e.preventDefault();

    const email = document.getElementById('recuperarEmail').value.trim();

    if (!email) {
        msgRec.innerHTML='❌ Ingresa correo';
        return;
    }

    const res = await recuperarPassword(email);

    if (res.success) {
        msgRec.innerHTML='✅ Enviado';
        setTimeout(()=>modal.style.display='none',2000);
    } else {
        msgRec.innerHTML='❌ '+res.message;
    }
});
</script>
