<div class="form-container animate-fade-in-up">
    <div class="form-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 class="text-gradient">Bienvenido de Nuevo</h2>
            <p style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: 0.5rem;">
                Ingresa a tu terminal de AXON-LAB
            </p>
        </div>
        
        <form id="loginForm">
            
            <div class="form-group">
                <label for="loginEmail" class="form-label required">Correo Electrónico</label>
                <input type="email" id="loginEmail" class="form-input" placeholder="usuario@ejemplo.com" required>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-2);">
                    <label for="loginPass" class="form-label required" style="margin-bottom: 0;">Contraseña</label>
                    <a href="#recuperar" style="font-size: 0.75rem; color: var(--color-primary);">¿Olvidaste tu contraseña?</a>
                </div>
                <input type="password" id="loginPass" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Entrar al Sistema
            </button>
            
            <div id="loginMessage" class="alert" style="display: none; margin-top: 1.5rem;"></div>
        </form>

        <div class="divider">O</div>
        
        <button type="button" class="btn-google">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="currentColor" d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C9.03,19.27 6.59,17.38 6.59,13.21C6.59,9.03 9.07,7.15 12.19,7.15C14.1,7.15 15.7,7.85 16.89,8.9L18.89,6.9C17.21,5.34 14.88,4.42 12.19,4.42C7.16,4.42 3.86,7.9 3.86,13.21C3.86,18.52 7.16,22 12.19,22C17.21,22 21.35,18.52 21.35,13.21C21.35,12.45 21.27,11.75 21.35,11.1Z" />
            </svg>
            Continuar con Google
        </button>

        <p style="text-align: center; font-size: var(--text-sm); color: var(--text-muted); margin-top: 1.5rem;">
            ¿No tienes una cuenta? 
            <a href="#registro" style="color: var(--color-secondary); font-weight: var(--font-bold); text-decoration: none;">
                Regístrate aquí
            </a>
        </p>
    </div>
</div>
