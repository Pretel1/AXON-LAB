<div class="form-card">
    <h2>🔑 Iniciar Sesión</h2>
    <form id="formLogin">
        <div class="form-group"><label>Correo electrónico</label><input type="email" id="loginEmail" required></div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword" required></div>
        <button type="submit" class="btn">Ingresar</button>
        <div id="msgLogin"></div>
    </form>
    <p>¿No tienes cuenta? <a href="#" onclick="window.cambiarPagina('registro'); return false;">Regístrate aquí</a></p>
</div>
<script>
    document.getElementById('formLogin').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const result = window.iniciarSesion(email, password);
        if (result.success) {
            document.getElementById('msgLogin').innerHTML = `<div class="alert alert-success">${result.message}</div>`;
            setTimeout(() => window.cambiarPagina('inicio'), 1000);
        } else {
            document.getElementById('msgLogin').innerHTML = `<div class="alert alert-error">${result.message}</div>`;
        }
    });
</script>
