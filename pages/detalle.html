<div class="page fade-in" id="detallePage">
    <div class="container" style="max-width: 1000px; margin: 0 auto; padding: 1rem;">
        <button id="backBtn" class="btn btn-outline">← Volver</button>
        <div id="detalleContent" style="margin-top: 2rem;"></div>
    </div>
</div>

<script type="module">
import { getLabById, incrementDownloads, deleteLab } from '../js/labs.js';
import { obtenerUsuarioActual } from '../js/auth.js';

async function cargarDetalle() {
    const params = new URLSearchParams(window.location.hash.split('?')[1]);
    const id = params.get('id');
    const container = document.getElementById('detalleContent');
    const user = obtenerUsuarioActual();

    const result = await getLabById(id);
    if (!result.success) {
        container.innerHTML = `<h3>❌ Error: ${result.error}</h3>`;
        return;
    }

    const lab = result.lab;
    const isOwnerOrAdmin = user && (user.id === lab.userId || user.rol === 'admin');
    
    let btnHtml = '';
    if (lab.tipo === 'archivo') {
        btnHtml = `<button id="downloadBtn" class="btn btn-primary">📥 Descargar Archivo</button>`;
    } else {
        btnHtml = `<button id="linkBtn" class="btn btn-secondary">🌐 Abrir Enlace OneDrive</button>`;
    }

    container.innerHTML = `
        <div class="card card-body">
            <span class="lab-card-category">📁 ${lab.category} | Tipo: ${lab.tipo}</span>
            <h1 style="margin: 1rem 0;">${lab.title}</h1>
            <p><strong>Autor:</strong> ${lab.userName}</p>
            <p style="margin: 1rem 0;">${lab.description}</p>
            <div style="display: flex; gap: 1rem;">
                ${btnHtml}
                ${isOwnerOrAdmin ? `<button id="deleteBtn" class="btn btn-error">🗑️ Eliminar</button>` : ''}
            </div>
        </div>
    `;

    document.getElementById('downloadBtn')?.addEventListener('click', async () => {
        await incrementDownloads(lab.id, lab.downloads);
        window.open(lab.fileUrl, '_blank');
    });

    document.getElementById('linkBtn')?.addEventListener('click', async () => {
        await incrementDownloads(lab.id, lab.downloads);
        window.open(lab.fileUrl, '_blank');
    });

    document.getElementById('deleteBtn')?.addEventListener('click', async () => {
        if(confirm('¿Eliminar recurso?')) {
            await deleteLab(lab.id, lab.fileUrl, lab.userId, lab.tipo);
            window.location.hash = 'laboratorios';
        }
    });
}
cargarDetalle();
document.getElementById('backBtn').addEventListener('click', () => window.location.hash = 'laboratorios');
</script>
