<!-- ============================================ -->
<!-- PÁGINA: DETALLE DEL LABORATORIO (APPWRITE)   -->
<!-- Usa Appwrite Storage, descarga real          -->
<!-- ============================================ -->

<div class="page fade-in" id="detallePage">
    <div class="container" style="max-width: 1000px;">
        <div style="margin-bottom: var(--space-md);">
            <button id="backBtn" class="btn btn-outline">
                ← Volver a laboratorios
            </button>
        </div>
        
        <div id="detalleContent">
            <div style="text-align: center; padding: var(--space-3xl);">
                <div class="loader-spinner" style="margin: 0 auto;"></div>
                <p style="margin-top: var(--space-md); color: var(--text-muted);">Cargando laboratorio...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { getDownloadUrl, incrementDownloads } from '../js/labs.js';
    import { haySesionActiva, obtenerUsuarioActual } from '../js/auth.js';
    
    // ============================================
    // OBTENER ID DE LABORATORIO
    // ============================================
    function obtenerIdLaboratorio() {
        const hash = window.location.hash;
        const match = hash.match(/[?&]id=([^&]+)/);
        if (match) {
            return decodeURIComponent(match[1]);
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id');
    }
    
    // ============================================
    // OBTENER NOMBRE DE CATEGORÍA
    // ============================================
    function getNombreCategoria(categoria) {
        const nombres = {
            'seguridad_web': '🔒 Seguridad Web',
            'cryptografia': '🔐 Criptografía',
            'redes': '🌐 Redes',
            'malware': '🐛 Análisis de Malware',
            'forensica': '🔍 Forensica Digital',
            'programacion': '💻 Programación',
            'ia': '🧠 Inteligencia Artificial'
        };
        return nombres[categoria] || categoria || '📚 General';
    }
    
    // ============================================
    // FORMATO DE FECHA
    // ============================================
    function formatearFecha(fecha) {
        if (!fecha) return 'Reciente';
        try {
            return new Date(fecha).toLocaleDateString('es-PE', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        } catch (e) {
            return fecha;
        }
    }
    
    // ============================================
    // ESCAPE HTML (SEGURIDAD)
    // ============================================
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ============================================
    // MOSTRAR MENSAJE
    // ============================================
    function mostrarMensaje(mensaje, tipo) {
        const el = document.getElementById('mensajeDetalle');
        if (!el) return;
        el.textContent = mensaje;
        el.className = `alert alert-${tipo}`;
        el.style.display = 'block';
        setTimeout(() => {
            el.style.display = 'none';
        }, 3000);
    }
    
    // ============================================
    // CARGAR DETALLE DEL LABORATORIO
    // ============================================
    async function cargarDetalle() {
        const id = obtenerIdLaboratorio();
        const container = document.getElementById('detalleContent');
        
        if (!id) {
            container.innerHTML = `
                <div style="text-align: center; padding: var(--space-3xl);">
                    <span style="font-size: 4rem;">❌</span>
                    <h2 style="margin-top: var(--space-4);">Laboratorio no encontrado</h2>
                    <p style="color: var(--text-muted); margin-top: var(--space-4);">
                        No se especificó un ID de laboratorio válido.
                    </p>
                    <button onclick="window.location.hash='laboratorios'" class="btn btn-primary" style="margin-top: var(--space-lg);">
                        📚 Ver todos los laboratorios
                    </button>
                </div>
            `;
            return;
        }
        
        try {
            // Obtener laboratorio desde la lista global o desde API
            // Necesitas pasar el lab como parámetro o tenerlo en memoria
            const lab = window.laboratorioActual;
            
            if (!lab) {
                container.innerHTML = `
                    <div style="text-align: center; padding: var(--space-3xl);">
                        <span style="font-size: 4rem;">❌</span>
                        <h2 style="margin-top: var(--space-4);">Laboratorio no encontrado</h2>
                        <p style="color: var(--text-muted); margin-top: var(--space-4);">
                            El laboratorio que buscas no existe o ha sido eliminado.
                        </p>
                        <button onclick="window.location.hash='laboratorios'" class="btn btn-primary" style="margin-top: var(--space-lg);">
                            📚 Ver todos los laboratorios
                        </button>
                    </div>
                `;
                return;
            }
            
            const user = obtenerUsuarioActual();
            const isAuthenticated = haySesionActiva();
            
            // Renderizar HTML
            container.innerHTML = `
                <div id="mensajeDetalle" style="display: none; margin-bottom: var(--space-md);"></div>
                
                <div style="background: var(--bg-card); border-radius: var(--radius-xl); padding: var(--space-xl); border: 1px solid var(--border-color);">
                    
                    <!-- Cabecera -->
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: var(--space-lg);">
                        <span class="lab-card-category" style="font-size: 1rem; padding: 0.5rem 1rem;">
                            📚 ${getNombreCategoria(lab.category)}
                        </span>
                        <div style="display: flex; gap: var(--space-md); color: var(--text-muted); font-size: var(--text-sm);">
                            <span>⬇️ ${lab.downloads || 0} descargas</span>
                            <span>📅 ${formatearFecha(lab.createdAt)}</span>
                        </div>
                    </div>
                    
                    <!-- Título -->
                    <h1 style="font-size: var(--text-3xl); margin-bottom: var(--space-md); color: var(--text-primary);">
                        ${escapeHtml(lab.title)}
                    </h1>
                    
                    <!-- Autor -->
                    <div style="display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-lg); padding-bottom: var(--space-md); border-bottom: 1px solid var(--border-color);">
                        <div style="width: 50px; height: 50px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            👨‍🏫
                        </div>
                        <div>
                            <div style="font-weight: 600; color: var(--text-primary);">${escapeHtml(lab.userName || lab.userEmail)}</div>
                            <div style="color: var(--text-muted); font-size: var(--text-sm);">Autor(es)</div>
                        </div>
                    </div>
                    
                    <!-- Descripción -->
                    <div style="margin-bottom: var(--space-xl);">
                        <h3 style="margin-bottom: var(--space-sm); color: var(--text-primary);">📝 Descripción</h3>
                        <p style="color: var(--text-muted); line-height: 1.6;">
                            ${escapeHtml(lab.description || 'Sin descripción disponible.')}
                        </p>
                    </div>
                    
                    <!-- Información del archivo -->
                    <div style="margin-bottom: var(--space-xl); padding: var(--space-md); background: rgba(0,245,255,0.05); border-radius: var(--radius-lg);">
                        <h3 style="margin-bottom: var(--space-sm); color: var(--text-primary);">📄 Información del archivo</h3>
                        <p style="color: var(--text-muted);">
                            <strong>Nombre:</strong> ${escapeHtml(lab.fileName)}<br>
                            <strong>Tamaño:</strong> ${(lab.fileSize / 1024).toFixed(2)} KB<br>
                            <strong>Tipo:</strong> ${lab.fileType || 'Desconocido'}
                        </p>
                    </div>
                    
                    <!-- Botones de acción -->
                    <div style="display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center;">
                        <button id="descargarBtn" class="btn btn-primary" style="display: inline-flex; align-items: center; gap: var(--space-2);">
                            📥 Descargar Laboratorio
                        </button>
                        
                        ${!isAuthenticated ? `
                        <p style="color: var(--text-muted); font-size: var(--text-sm); width: 100%; text-align: center;">
                            🔐 <a href="#login" style="color: var(--color-primary);">Inicia sesión</a> para más funcionalidades
                        </p>
                        ` : ''}
                    </div>
                </div>
            `;
            
            // ============================================
            // EVENTO: DESCARGA REAL DESDE APPWRITE STORAGE
            // ============================================
            const descargarBtn = document.getElementById('descargarBtn');
            if (descargarBtn && lab.fileId) {
                descargarBtn.addEventListener('click', async () => {
                    descargarBtn.disabled = true;
                    descargarBtn.innerHTML = '⏳ Preparando descarga...';
                    
                    try {
                        // Obtener URL de descarga desde Appwrite Storage
                        const url = await getDownloadUrl(lab.fileId);
                        
                        if (url) {
                            // Crear enlace de descarga
                            const link = document.createElement('a');
                            link.href = url;
                            link.download = lab.fileName || 'laboratorio';
                            link.target = '_blank';
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            
                            // Incrementar contador de descargas
                            await incrementDownloads(lab.$id, lab.downloads || 0);
                            mostrarMensaje('✅ Descarga iniciada correctamente', 'success');
                            
                            // Actualizar contador visualmente
                            const descargasSpan = document.querySelector('.lab-card-stats span:first-child');
                            if (descargasSpan) {
                                descargasSpan.innerHTML = `⬇️ ${(lab.downloads || 0) + 1} descargas`;
                            }
                        } else {
                            mostrarMensaje('❌ Error al obtener el archivo', 'error');
                        }
                        
                    } catch (error) {
                        console.error('Error en descarga:', error);
                        mostrarMensaje('❌ Error al descargar el archivo', 'error');
                    } finally {
                        descargarBtn.disabled = false;
                        descargarBtn.innerHTML = '📥 Descargar Laboratorio';
                    }
                });
            }
            
        } catch (error) {
            console.error('Error al cargar detalle:', error);
            container.innerHTML = `
                <div style="text-align: center; padding: var(--space-3xl);">
                    <span style="font-size: 4rem;">❌</span>
                    <h2 style="margin-top: var(--space-4);">Error al cargar</h2>
                    <p style="color: var(--text-muted); margin-top: var(--space-4);">${error.message}</p>
                    <button onclick="window.location.hash='laboratorios'" class="btn btn-primary" style="margin-top: var(--space-lg);">
                        📚 Volver a laboratorios
                    </button>
                </div>
            `;
        }
    }
    
    // ============================================
    // BOTÓN VOLVER
    // ============================================
    document.getElementById('backBtn')?.addEventListener('click', () => {
        window.location.hash = 'laboratorios';
    });
    
    // Inicializar
    cargarDetalle();
</script>
