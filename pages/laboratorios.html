<!-- ============================================ -->
<!-- PÁGINA: LISTADO DE LABORATORIOS              -->
<!-- Buscador, filtros y grid de tarjetas        -->
<!-- ============================================ -->

<div class="page fade-in">
    <div class="page-header" style="text-align: center; margin-bottom: var(--space-xl);">
        <h1>📚 <span class="highlight">Laboratorios</span></h1>
        <p style="color: var(--text-muted);">Explora todos los laboratorios disponibles en el repositorio</p>
    </div>
    
    <!-- Buscador y Filtros -->
    <div class="search-section" style="max-width: 800px; margin: 0 auto var(--space-2xl) auto;">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre, autor o descripción...">
        </div>
        <div class="filter-group" style="justify-content: center; margin-top: var(--space-md);">
            <span class="filter-label">Filtrar por:</span>
            <select id="categoryFilter" class="filter-select">
                <option value="todas">📂 Todas las categorías</option>
                <option value="redes">🌐 Redes</option>
                <option value="programacion">💻 Programación</option>
                <option value="bases-datos">🗄️ Bases de Datos</option>
                <option value="inteligencia">🧠 Inteligencia Artificial</option>
                <option value="seguridad">🔒 Seguridad</option>
            </select>
            <button id="resetFiltersBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">🔄 Limpiar</button>
        </div>
    </div>
    
    <div class="results-info" style="text-align: center;">
        <span id="resultsCount">0</span> laboratorios encontrados
    </div>
    
    <div class="labs-grid" id="labsGrid">
        <div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);">
            <div class="loader-spinner" style="margin: 0 auto;"></div>
            <p style="margin-top: var(--space-md);">Cargando laboratorios...</p>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    
    let todosLosLaboratorios = [];
    let searchTimeout = null;
    
    // ============================================
    // CARGAR LABORATORIOS DESDE FIRESTORE
    // ============================================
    async function cargarLaboratorios() {
        const container = document.getElementById('labsGrid');
        container.innerHTML = `
            <div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);">
                <div class="loader-spinner" style="margin: 0 auto;"></div>
                <p style="margin-top: var(--space-md);">Cargando laboratorios...</p>
            </div>
        `;
        
        try {
            todosLosLaboratorios = await window.obtenerLaboratorios();
            renderizarLaboratorios(todosLosLaboratorios);
        } catch (error) {
            console.error('Error al cargar laboratorios:', error);
            container.innerHTML = `
                <div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);">
                    <span style="font-size: 3rem;">❌</span>
                    <h3>Error al cargar</h3>
                    <p style="color: var(--text-muted);">No se pudieron cargar los laboratorios</p>
                    <button onclick="location.reload()" class="btn btn-primary" style="margin-top: var(--space-md);">🔄 Reintentar</button>
                </div>
            `;
        }
    }
    
    // ============================================
    // RENDERIZAR TARJETAS DE LABORATORIOS
    // ============================================
    function renderizarLaboratorios(laboratorios) {
        const container = document.getElementById('labsGrid');
        const resultsSpan = document.getElementById('resultsCount');
        
        resultsSpan.textContent = laboratorios.length;
        
        if (laboratorios.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);">
                    <span style="font-size: 4rem;">📭</span>
                    <h3>No hay laboratorios</h3>
                    <p style="color: var(--text-muted); margin-top: var(--space-sm);">Sé el primero en compartir tu conocimiento</p>
                    <a href="#subir" class="btn btn-primary" style="margin-top: var(--space-lg);">📤 Subir laboratorio</a>
                </div>
            `;
            return;
        }
        
        const getIconoCategoria = (cat) => {
            const icons = { redes: '🌐', programacion: '💻', 'bases-datos': '🗄️', inteligencia: '🧠', seguridad: '🔒' };
            return icons[cat] || '📚';
        };
        
        const getNombreCategoria = (cat) => {
            const nombres = { redes: 'Redes', programacion: 'Programación', 'bases-datos': 'Bases de Datos', inteligencia: 'IA', seguridad: 'Seguridad' };
            return nombres[cat] || cat;
        };
        
        container.innerHTML = laboratorios.map(lab => `
            <div class="lab-card" data-id="${lab.id}" style="cursor: pointer;">
                <div class="lab-card-image" style="background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); display: flex; align-items: center; justify-content: center; font-size: 3rem;">
                    ${lab.imagenURL ? `<img src="${lab.imagenURL}" alt="${escapeHtml(lab.nombre)}" style="width: 100%; height: 100%; object-fit: cover;">` : (lab.icono || getIconoCategoria(lab.categoria))}
                </div>
                <div class="lab-card-content">
                    <span class="lab-card-category">${getIconoCategoria(lab.categoria)} ${getNombreCategoria(lab.categoria)}</span>
                    <h3 class="lab-card-title">${escapeHtml(lab.nombre)}</h3>
                    <p class="lab-card-author">👨‍🏫 ${escapeHtml(lab.autor)}</p>
                    <p class="lab-card-description">${escapeHtml(lab.descripcion?.substring(0, 120) || 'Sin descripción')}${lab.descripcion?.length > 120 ? '...' : ''}</p>
                    <div class="lab-card-stats">
                        <span>📥 ${lab.descargas || 0}</span>
                        <span>👁️ ${lab.vistas || 0}</span>
                        <span>📅 ${lab.fecha ? new Date(lab.fecha).toLocaleDateString('es-PE') : 'Reciente'}</span>
                    </div>
                    <div style="margin-top: var(--space-md); display: flex; gap: var(--space-sm); flex-wrap: wrap;">
                        ${lab.archivoURL ? `
                        <button class="btn-descargar" data-id="${lab.id}" data-url="${lab.archivoURL}" data-nombre="${lab.archivoNombre}" style="background: var(--color-primary); border: none; padding: 0.5rem 1rem; border-radius: var(--radius-md); color: white; cursor: pointer; transition: all 0.2s;">
                            📥 Descargar
                        </button>
                        ` : ''}
                        <button class="btn-ver" data-id="${lab.id}" style="background: transparent; border: 1px solid var(--color-primary); padding: 0.5rem 1rem; border-radius: var(--radius-md); color: var(--color-primary); cursor: pointer; transition: all 0.2s;">
                            👁️ Ver detalle
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Event listeners para tarjetas (clic en la tarjeta para ver detalle)
        document.querySelectorAll('.lab-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('btn-descargar') || 
                    e.target.classList.contains('btn-ver') ||
                    e.target.closest('.btn-descargar') ||
                    e.target.closest('.btn-ver')) {
                    return;
                }
                const id = card.getAttribute('data-id');
                if (id && typeof window.cambiarPagina === 'function') {
                    window.cambiarPagina('detalle', { id: id });
                }
            });
        });
        
        // Event listeners para botón descargar
        document.querySelectorAll('.btn-descargar').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const url = btn.getAttribute('data-url');
                const nombre = btn.getAttribute('data-nombre') || 'laboratorio';
                
                if (url) {
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = nombre;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    await window.incrementarDescargas(id);
                    if (typeof window.mostrarNotificacion === 'function') {
                        window.mostrarNotificacion('📥 Descarga iniciada', 'success', 2000);
                    }
                } else {
                    if (typeof window.mostrarNotificacion === 'function') {
                        window.mostrarNotificacion('⚠️ No hay archivo disponible', 'warning', 2000);
                    }
                }
            });
        });
        
        // Event listeners para botón ver detalle
        document.querySelectorAll('.btn-ver').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if (typeof window.cambiarPagina === 'function') {
                    window.cambiarPagina('detalle', { id: id });
                } else {
                    window.location.hash = `detalle?id=${id}`;
                }
            });
        });
    }
    
    // ============================================
    // FILTRAR LABORATORIOS
    // ============================================
    function filtrar() {
        const searchTerm = document.getElementById('searchInput')?.value || '';
        const categoria = document.getElementById('categoryFilter')?.value || 'todas';
        const filtrados = window.filtrarLaboratorios(todosLosLaboratorios, searchTerm, categoria);
        renderizarLaboratorios(filtrados);
    }
    
    // ============================================
    // ESCAPE HTML (SEGURIDAD)
    // ============================================
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ============================================
    // DEBOUNCE PARA BÚSQUEDA
    // ============================================
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const resetBtn = document.getElementById('resetFiltersBtn');
    
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filtrar, 300);
        });
    }
    
    if (categoryFilter) {
        categoryFilter.addEventListener('change', filtrar);
    }
    
    if (resetBtn) {
        resetBtn.addEventListener('click', () => {
            if (searchInput) searchInput.value = '';
            if (categoryFilter) categoryFilter.value = 'todas';
            filtrar();
        });
    }
    
    // Inicializar
    cargarLaboratorios();
    
})();
</script>
