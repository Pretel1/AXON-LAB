<div class="container">
    <h2>📚 Laboratorios Disponibles</h2>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar por nombre..." oninput="filtrar()">
        <select id="categoriaFilter" onchange="filtrar()">
            <option value="">Todas las categorías</option>
            <option>Programación</option>
            <option>Redes</option>
            <option>Bases de Datos</option>
            <option>Inteligencia Artificial</option>
            <option>Seguridad</option>
            <option>Otros</option>
        </select>
    </div>
    <div id="listaLaboratorios" class="grid"></div>
</div>

<script>
    let laboratorios = [];

    function cargarLabs() {
        laboratorios = window.obtenerLaboratorios();
        filtrar();
    }

    function filtrar() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categoriaFilter').value;
        const filtrados = laboratorios.filter(lab =>
            lab.nombre.toLowerCase().includes(term) &&
            (cat === '' || lab.categoria === cat)
        );
        const contenedor = document.getElementById('listaLaboratorios');
        if (!filtrados.length) {
            contenedor.innerHTML = '<p>No hay laboratorios.</p>';
            return;
        }
        contenedor.innerHTML = filtrados.map(lab => `
            <div class="card">
                ${lab.portada ? `<img src="${lab.portada}" style="width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 10px;">` : `<div style="width: 100%; height: 160px; background: #e2e8f0; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;">📷 Sin portada</div>`}
                <h3>${lab.nombre}</h3>
                <p><strong>Autor:</strong> ${lab.autor}</p>
                <p><strong>Categoría:</strong> ${lab.categoria}</p>
                <div class="url">🔗 ${lab.url.length > 50 ? lab.url.substring(0,50)+'...' : lab.url}</div>
                <div class="btn-group">
                    <button class="btn" onclick="window.visualizarODescargar('${lab.url}')">👁️ Ver archivo</button>
                    <button class="btn btn-outline" onclick="window.open('${lab.url}', '_blank'); window.mostrarNotificacion('Abre el enlace y descarga desde OneDrive', 'info');">⬇️ Descargar</button>
                </div>
            </div>
        `).join('');
    }

    window.filtrar = filtrar;
    cargarLabs();
    document.addEventListener('pageLoaded', (e) => { if (e.detail.page === 'laboratorios') cargarLabs(); });
</script>
