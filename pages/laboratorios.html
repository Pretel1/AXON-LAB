<div class="container">
    <h2>📚 Laboratorios Disponibles</h2>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar por nombre..." oninput="filtrar()">
        <select id="categoriaFilter" onchange="filtrar()">
            <option value="">Todas las categorías</option>
            <option>Programación</option><option>Redes</option><option>Bases de Datos</option>
            <option>Inteligencia Artificial</option><option>Seguridad</option><option>Otros</option>
        </select>
    </div>
    <div id="listaLaboratorios" class="grid"></div>
</div>
<script>
    let laboratorios = [];

    function cargarLabs() {
        laboratorios = window.obtenerLaboratorios();
        filtrar();
    }

    function filtrar() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categoriaFilter').value;
        const currentUser = window.obtenerUsuarioActual();
        const filtrados = laboratorios.filter(lab =>
            lab.nombre.toLowerCase().includes(term) &&
            (cat === '' || lab.categoria === cat)
        );
        const contenedor = document.getElementById('listaLaboratorios');
        if (!filtrados.length) {
            contenedor.innerHTML = '<p>No hay laboratorios.</p>';
            return;
        }
        contenedor.innerHTML = filtrados.map(lab => `
            <div class="card">
                <img src="${lab.imagenUrl}" alt="Portada" style="width:100%; height:160px; object-fit:cover; border-radius:12px; margin-bottom:10px;">
                <h3>${lab.nombre}</h3>
                <p><strong>Autor:</strong> ${lab.autor}</p>
                <p><strong>Categoría:</strong> ${lab.categoria}</p>
                <p><strong>Subido por:</strong> ${lab.ownerNombre || 'Anónimo'}</p>
                <div class="btn-group">
                    <button class="btn" onclick="window.visualizarArchivo('${lab.archivoUrl}')">📥 Ver/Descargar</button>
                    ${currentUser && lab.ownerId === currentUser.id ? `<button class="btn btn-outline" onclick="eliminarLab(${lab.id})">🗑️ Eliminar</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    async function eliminarLab(id) {
        if (confirm('¿Eliminar este laboratorio?')) {
            const result = window.eliminarLaboratorio(id);
            window.mostrarNotificacion(result.message, result.success ? 'success' : 'error');
            if (result.success) cargarLabs();
        }
    }

    window.filtrar = filtrar;
    cargarLabs();
    document.addEventListener('pageLoaded', (e) => {
        if (e.detail.page === 'laboratorios') cargarLabs();
    });
</script>
