<div class="container animate-fade-in">
    <div class="page-header" style="margin-bottom: 2rem;">
        <h2 class="text-gradient">📚 Repositorio de Laboratorios</h2>
        <p>Accede a recursos técnicos y documentación especializada.</p>
    </div>
    
    <div class="search-section" style="margin-bottom: 2rem; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <input type="text" id="searchInput" class="form-input" 
                   placeholder="🔍 Buscar por título o descripción..." 
                   style="flex: 2; min-width: 250px;">
            
            <select id="categoriaFilter" class="form-select" style="flex: 1; min-width: 180px;">
                <option value="">📋 Todas las categorías</option>
                </select>
            
            <button id="btnFiltrar" class="btn btn-primary" style="min-width: 120px;">Filtrar</button>
            <button id="btnLimpiar" class="btn btn-outline" title="Limpiar Filtros">🗑️</button>
        </div>
    </div>
    
    <div id="resultadosInfo" style="margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-muted); display: none;">
        <span id="resultadosCount" class="badge"></span>
    </div>
    
    <div id="listaLaboratorios" class="labs-grid">
        <div class="loader-container">
            <div class="loader-spinner"></div>
            <p>Sincronizando con la base de datos...</p>
        </div>
    </div>
</div>

<style>
    /* Estilos específicos para la grilla de laboratorios */
    .labs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 2rem;
    }
    
    .lab-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    
    .lab-card:hover {
        transform: translateY(-8px);
        border-color: var(--color-primary);
        box-shadow: 0 12px 30px -10px rgba(0, 243, 255, 0.2);
    }
    
    .lab-card-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    
    .lab-card-category {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--color-primary);
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
    }
    
    .lab-card-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: var(--text-primary);
    }
    
    .lab-card-description {
        font-size: 0.9rem;
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: 1.5rem;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .lab-card-stats {
        display: flex;
        justify-content: space-between;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
        font-size: 0.75rem;
        color: var(--text-muted);
    }

    .lab-card-footer {
        padding: 1rem 1.5rem;
        background: rgba(255, 255, 255, 0.02);
        display: flex;
        gap: 0.5rem;
    }
</style>

<script type="module">
    import { listLabs, incrementDownloads, deleteLab } from '../js/labs.js';
    import { obtenerUsuarioActual } from '../js/auth.js';
    
    let laboratoriosData = [];
    
    // 1. CARGAR CATEGORÍAS (De forma única basada en los datos)
    async function cargarCategorias() {
        const result = await listLabs();
        if (result.success) {
            const categorias = [...new Set(result.labs.map(l => l.category))].filter(Boolean).sort();
            const select = document.getElementById('categoriaFilter');
            if (select) {
                select.innerHTML = '<option value="">📋 Todas las categorías</option>';
                categorias.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = `📁 ${cat}`;
                    select.appendChild(opt);
                });
            }
            laboratoriosData = result.labs;
            renderizar(laboratoriosData);
        }
    }
    
    // 2. RENDERIZAR TARJETAS
    function renderizar(labs) {
        const container = document.getElementById('listaLaboratorios');
        const countInfo = document.getElementById('resultadosInfo');
        const countText = document.getElementById('resultadosCount');
        const user = obtenerUsuarioActual();

        if (labs.length === 0) {
            container.innerHTML = `<div class="empty-state"><h3>No hay laboratorios disponibles</h3></div>`;
            if (countInfo) countInfo.style.display = 'none';
            return;
        }

        if (countInfo) {
            countText.textContent = `Resultados: ${labs.length}`;
            countInfo.style.display = 'block';
        }

        container.innerHTML = labs.map(lab => `
            <div class="lab-card animate-up">
                <div class="lab-card-content">
                    <span class="lab-card-category">${lab.category || 'General'}</span>
                    <h3 class="lab-card-title">${lab.title}</h3>
                    <p class="lab-card-description">${lab.description}</p>
                    <div class="lab-card-stats">
                        <span>👤 ${lab.userName}</span>
                        <span>⬇️ ${lab.downloads || 0}</span>
                    </div>
                </div>
                <div class="lab-card-footer">
                    <a href="${lab.fileUrl}" target="_blank" class="btn btn-primary btn-sm" 
                       onclick="window.dispatchEvent(new CustomEvent('incDownload', {detail: '${lab.id}'}))"
                       style="flex: 1; text-align: center; text-decoration: none;">
                       Descargar
                    </a>
                    ${user && (user.id === lab.userId || user.rol === 'admin') ? `
                        <button class="btn btn-error btn-sm" onclick="window.confirmDelete('${lab.id}', '${lab.fileUrl}', '${lab.userId}')">
                            🗑️
                        </button>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    // 3. FILTRADO LÓGICO
    function ejecutarFiltro() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categoriaFilter').value;

        const filtrados = laboratoriosData.filter(lab => {
            const coincideBusqueda = lab.title.toLowerCase().includes(term) || lab.description.toLowerCase().includes(term);
            const coincideCategoria = cat === "" || lab.category === cat;
            return coincideBusqueda && coincideCategoria;
        });

        renderizar(filtrados);
    }

    // 4. FUNCIONES GLOBALES PARA EVENTOS INLINE
    window.confirmDelete = async (id, url, userId) => {
        if (confirm('¿Seguro que deseas eliminar este laboratorio?')) {
            const res = await deleteLab(id, url, userId, 'archivo');
            if (res.success) {
                alert('Eliminado con éxito');
                cargarCategorias();
            } else {
                alert('Error: ' + res.error);
            }
        }
    };

    window.addEventListener('incDownload', async (e) => {
        const labId = e.detail;
        const lab = laboratoriosData.find(l => l.id === labId);
        if (lab) await incrementDownloads(labId, lab.downloads);
    });

    // 5. EVENT LISTENERS
    document.getElementById('btnFiltrar').addEventListener('click', ejecutarFiltro);
    document.getElementById('btnLimpiar').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('categoriaFilter').value = '';
        renderizar(laboratoriosData);
    });

    // Inicializar
    cargarCategorias();
</script>
