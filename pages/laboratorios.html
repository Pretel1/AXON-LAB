<!-- ============================================ -->
<!-- PÁGINA: LABORATORIOS                         -->
<!-- ============================================ -->

<div class="page fade-in">
    <div class="page-header" style="text-align: center; margin-bottom: var(--space-xl);">
        <h1>📚 <span class="highlight">Laboratorios</span></h1>
        <p style="color: var(--text-muted);">Explora todos los laboratorios disponibles</p>
    </div>

    <!-- Buscador y Filtros -->
    <div class="search-section" style="max-width: 800px; margin: 0 auto var(--space-2xl) auto;">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre o autor...">
        </div>
        <div class="filter-group" style="justify-content: center; margin-top: var(--space-md);">
            <span class="filter-label">Filtrar por:</span>
            <select id="categoryFilter" class="filter-select">
                <option value="todas">📂 Todas las categorías</option>
                <option value="redes">🌐 Redes</option>
                <option value="programacion">💻 Programación</option>
                <option value="bases-datos">🗄️ Bases de Datos</option>
                <option value="inteligencia">🧠 Inteligencia Artificial</option>
                <option value="seguridad">🔒 Seguridad</option>
            </select>
            <button id="resetFiltersBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">🔄 Limpiar</button>
        </div>
    </div>

    <div class="results-info" style="text-align: center;">
        <span id="resultsCount">0</span> laboratorios encontrados
    </div>

    <div class="labs-grid" id="labsGrid">
        <div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);">
            <div class="loader-spinner" style="margin: 0 auto;"></div>
            <p style="margin-top: var(--space-md);">Cargando laboratorios...</p>
        </div>
    </div>
</div>

<script>
    let todosLosLaboratorios = [];
    
    async function cargarLaboratorios() {
        const container = document.getElementById('labsGrid');
        container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);"><div class="loader-spinner" style="margin: 0 auto;"></div><p style="margin-top: var(--space-md);">Cargando laboratorios...</p></div>';
        
        try {
            todosLosLaboratorios = await window.obtenerLaboratorios();
            renderizarLaboratorios(todosLosLaboratorios);
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);"><span style="font-size: 3rem;">❌</span><h3>Error al cargar</h3><p style="color: var(--text-muted);">No se pudieron cargar los laboratorios</p></div>';
        }
    }
    
    function renderizarLaboratorios(laboratorios) {
        const container = document.getElementById('labsGrid');
        const resultsSpan = document.getElementById('resultsCount');
        
        resultsSpan.textContent = laboratorios.length;
        
        if (laboratorios.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; grid-column: 1/-1; padding: var(--space-3xl);">
                    <span style="font-size: 4rem;">📭</span>
                    <h3>No hay laboratorios</h3>
                    <p style="color: var(--text-muted);">Sé el primero en subir un laboratorio</p>
                    <a href="#subir" class="btn btn-primary" style="margin-top: var(--space-md);">📤 Subir laboratorio</a>
                </div>
            `;
            return;
        }
        
        const getIconoCategoria = (cat) => {
            const icons = { redes: '🌐', programacion: '💻', 'bases-datos': '🗄️', inteligencia: '🧠', seguridad: '🔒' };
            return icons[cat] || '📚';
        };
        
        const getNombreCategoria = (cat) => {
            const nombres = { redes: 'Redes', programacion: 'Programación', 'bases-datos': 'Bases de Datos', inteligencia: 'IA', seguridad: 'Seguridad' };
            return nombres[cat] || cat;
        };
        
        container.innerHTML = laboratorios.map(lab => `
            <div class="lab-card" data-id="${lab.id}">
                <div class="lab-card-image">${lab.icono || getIconoCategoria(lab.categoria)}</div>
                <div class="lab-card-content">
                    <span class="lab-card-category">${getIconoCategoria(lab.categoria)} ${getNombreCategoria(lab.categoria)}</span>
                    <h3 class="lab-card-title">${lab.nombre}</h3>
                    <p class="lab-card-author">👨‍🏫 ${lab.autor}</p>
                    <p class="lab-card-description">${lab.descripcion?.substring(0, 120) || 'Sin descripción'}${lab.descripcion?.length > 120 ? '...' : ''}</p>
                    <div class="lab-card-stats">
                        <span>📥 ${lab.descargas || 0}</span>
                        <span>👁️ ${lab.vistas || 0}</span>
                        <span>📅 ${lab.fecha?.split('T')[0] || 'Reciente'}</span>
                    </div>
                    <div style="margin-top: var(--space-md); display: flex; gap: var(--space-sm); flex-wrap: wrap;">
                        <button class="btn-descargar" data-id="${lab.id}" data-archivo="${lab.archivoURL || ''}" style="background: var(--color-primary); border: none; padding: 0.5rem 1rem; border-radius: var(--radius-md); color: white; cursor: pointer;">📥 Descargar</button>
                        <button class="btn-ver" data-id="${lab.id}" style="background: transparent; border: 1px solid var(--color-primary); padding: 0.5rem 1rem; border-radius: var(--radius-md); color: var(--color-primary); cursor: pointer;">👁️ Ver detalle</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Event listeners
        document.querySelectorAll('.btn-descargar').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                const archivoURL = btn.getAttribute('data-archivo');
                
                if (archivoURL) {
                    window.open(archivoURL, '_blank');
                    await window.incrementarDescargas(id);
                    mostrarNotificacion('📥 Descarga iniciada', 'success');
                } else {
                    mostrarNotificacion('⚠️ No hay archivo disponible', 'warning');
                }
            });
        });
        
        document.querySelectorAll('.btn-ver').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                window.location.href = `#detalle?id=${id}`;
            });
        });
    }
    
    function filtrar() {
        const searchTerm = document.getElementById('searchInput')?.value || '';
        const categoria = document.getElementById('categoryFilter')?.value || 'todas';
        const filtrados = window.filtrarLaboratorios(todosLosLaboratorios, searchTerm, categoria);
        renderizarLaboratorios(filtrados);
    }
    
    function mostrarNotificacion(mensaje, tipo) {
        const notificacion = document.createElement('div');
        notificacion.className = `alert alert-${tipo}`;
        notificacion.textContent = mensaje;
        notificacion.style.cssText = `position: fixed; bottom: 20px; right: 20px; z-index: 1000; max-width: 300px; animation: slideInRight 0.3s ease;`;
        document.body.appendChild(notificacion);
        setTimeout(() => notificacion.remove(), 3000);
    }
    
    // Inicializar
    document.getElementById('searchInput')?.addEventListener('input', filtrar);
    document.getElementById('categoryFilter')?.addEventListener('change', filtrar);
    document.getElementById('resetFiltersBtn')?.addEventListener('click', () => {
        if (document.getElementById('searchInput')) document.getElementById('searchInput').value = '';
        if (document.getElementById('categoryFilter')) document.getElementById('categoryFilter').value = 'todas';
        filtrar();
    });
    
    cargarLaboratorios();
</script>
