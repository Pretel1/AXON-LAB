<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="AXON - Repositorio de Laboratorios Académicos. Accede, comparte y gestiona laboratorios de todas las áreas del conocimiento.">
    <meta name="author" content="AXON Team">
    <meta name="keywords" content="laboratorios, académicos, repositorio, educación, redes, programación, inteligencia artificial">
    <meta name="theme-color" content="#0a0a0f">
    
    <title>AXON | Laboratorios Académicos</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/animaciones.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    
    <!-- Firebase SDKs (versión compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>
    
    <!-- EmailJS SDK (opcional) -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR / MENÚ LATERAL -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__logo">AXON</div>
                <div class="sidebar__subtitle">Laboratorios Académicos</div>
            </div>
            <nav class="sidebar__nav">
                <a href="#inicio" class="nav-link active" data-page="inicio">
                    <span class="icon">🏠</span><span>Inicio</span>
                </a>
                <a href="#laboratorios" class="nav-link" data-page="laboratorios">
                    <span class="icon">📚</span><span>Laboratorios</span>
                </a>
                <a href="#categorias" class="nav-link" data-page="categorias">
                    <span class="icon">🏷️</span><span>Categorías</span>
                </a>
                <a href="#subir" class="nav-link" data-page="subir" id="subirNavLink" style="display: none;">
                    <span class="icon">📤</span><span>Subir Laboratorio</span>
                </a>
                <div class="sidebar__divider"></div>
                <a href="#registro" class="nav-link" data-page="registro" id="registroNavLink">
                    <span class="icon">📝</span><span>Registrarse</span>
                </a>
                <a href="#login" class="nav-link" data-page="login" id="loginNavLink">
                    <span class="icon">🔑</span><span>Iniciar Sesión</span>
                </a>
                <a href="#logout" class="nav-link" id="logoutNavLink" style="display: none;">
                    <span class="icon">🚪</span><span>Cerrar Sesión</span>
                </a>
            </nav>
        </aside>

        <!-- Overlay para móvil (cierra sidebar al hacer clic fuera) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="main-header">
                <button class="menu-toggle" id="menuToggle" aria-label="Menú">☰</button>
                <div class="user-info" id="userInfo">
                    <span class="user-greeting">Bienvenido, <span id="userName">Invitado</span></span>
                    <div class="user-avatar" id="userAvatar">👤</div>
                </div>
            </header>
            
            <!-- Contenido dinámico de las páginas (cargado por router) -->
            <div id="page-content" class="page-content">
                <div class="loader">
                    <div class="loader-spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS DE LA APLICACIÓN (SIN DUPLICACIÓN)   -->
    <!-- ============================================ -->
    <!-- Configuración única de Firebase (expone window.firebaseAuth, etc.) -->
    <script src="js/firebase-config.js"></script>
    
    <!-- Utilidades y validaciones (si existen) -->
    <script src="js/utils.js"></script>
    <script src="js/validaciones.js"></script>
    
    <!-- Módulos principales -->
    <script src="js/auth.js"></script>
    <script src="js/labs.js"></script>
    <script src="js/progreso.js"></script>
    <script src="js/buscador.js"></script>
    
    <!-- Navegación SPA y FCM -->
    <script src="js/router.js"></script>
    <script src="js/fcm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
